<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Successors &times; A2RL - Partnership Thank You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --obsidian:      #060606;
    --carbon:        #0c0c0e;
    --carbon-2:      #131316;
    --ink:           #0a0a0c;

    --orange:        #FF6A1A;
    --orange-bright: #FF8A2A;
    --orange-soft:   #FFB36B;
    --orange-dim:    rgba(255, 106, 26, 0.55);
    --orange-faint:  rgba(255, 106, 26, 0.22);
    --orange-glow:   rgba(255, 106, 26, 0.16);
    --amber:         #FFB23F;

    --gold:          #E5B80B;
    --gold-bright:   #FFD23F;
    --gold-faint:    rgba(229, 184, 11, 0.16);

    --white:         #FFFFFF;
    --white-dim:     rgba(255, 255, 255, 0.74);
    --white-soft:    rgba(255, 255, 255, 0.56);
    --white-muted:   rgba(255, 255, 255, 0.40);
    --hairline:      rgba(255, 255, 255, 0.08);
    --hairline-strong: rgba(255, 255, 255, 0.14);
    --card-border:   rgba(255, 255, 255, 0.07);
    --a2rl-red:      #E21F27;
    --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.020'/%3E%3C/svg%3E");
  }

  @page { size: 1080px 1350px; margin: 0; }

  html, body {
    background: var(--obsidian);
    font-family: 'Montserrat', sans-serif;
    color: var(--white);
    min-height: 100%;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }
  html::-webkit-scrollbar,
  body::-webkit-scrollbar { display: none; }
  body {
    position: relative;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: var(--noise);
    background-repeat: repeat;
    pointer-events: none;
    z-index: 1;
  }

  .page {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    flex: 0 0 auto;
    width: 1080px;
  }

  .print-btn {
    position: fixed; top: 10px; left: calc(50% + 560px); z-index: 9999;
    font-family: 'Orbitron', sans-serif;
    font-size: 9pt; font-weight: 700;
    color: var(--obsidian); background: var(--orange);
    border: none; padding: 8px 20px; border-radius: 4px;
    cursor: pointer; letter-spacing: 0.1em;
    box-shadow: 0 2px 12px rgba(255, 106, 26, 0.30);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .print-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(255, 106, 26, 0.45);
  }
  @media screen and (max-width: 1320px) {
    .print-btn { display: none; }
  }

  .poster {
    width: 1080px; height: 1350px;
    position: relative; z-index: 1;
    overflow: hidden; isolation: isolate;
    color: var(--white);
    background: var(--obsidian);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  .atmosphere {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      radial-gradient(ellipse 880px 360px at 50% -8%,
        rgba(255, 106, 26, 0.30) 0%,
        rgba(255, 106, 26, 0.10) 38%,
        transparent 72%),
      radial-gradient(ellipse 760px 340px at 50% 102%,
        rgba(255, 106, 26, 0.20) 0%,
        rgba(255, 106, 26, 0.06) 44%,
        transparent 76%),
      radial-gradient(ellipse 700px 520px at 50% 57%,
        rgba(226, 31, 39, 0.12) 0%,
        rgba(255, 106, 26, 0.05) 38%,
        transparent 74%),
      radial-gradient(ellipse 120% 90% at 50% 50%,
        rgba(20, 20, 24, 0.55) 0%,
        rgba(6, 6, 6, 0.92) 70%,
        rgba(0, 0, 0, 1) 100%),
      var(--obsidian);
  }

  .carbon {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background-image:
      repeating-linear-gradient(45deg,
        rgba(255,255,255,0.055) 0 2px,
        transparent 2px 8px,
        rgba(0,0,0,0.30) 8px 10px,
        transparent 10px 16px),
      repeating-linear-gradient(-45deg,
        rgba(255,106,26,0.018) 0 2px,
        transparent 2px 10px,
        rgba(255,255,255,0.030) 10px 12px,
        transparent 12px 20px);
    opacity: 0.20;
    mix-blend-mode: screen;
  }

  .poster::before {
    content: '';
    position: absolute; inset: 0;
    background-image: var(--noise);
    background-repeat: repeat;
    pointer-events: none;
    z-index: 3;
  }

  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1.4px);
    background-size: 26px 26px;
    mask-image: radial-gradient(ellipse 85% 78% at 50% 50%, black 30%, transparent 92%);
    -webkit-mask-image: radial-gradient(ellipse 85% 78% at 50% 50%, black 30%, transparent 92%);
    pointer-events: none;
    z-index: 4;
    opacity: 0.72;
  }

  .frame {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(255,255,255,0.05);
    pointer-events: none;
    z-index: 5;
  }
  .frame::before, .frame::after,
  .frame > i:first-child, .frame > i:last-child {
    content: '';
    position: absolute;
    width: 38px; height: 38px;
    border-color: var(--orange-dim);
    border-style: solid;
    pointer-events: none;
  }
  .frame::before         { top: -1px;    left: -1px;    border-width: 1.6px 0 0 1.6px; }
  .frame::after          { bottom: -1px; right: -1px;   border-width: 0 1.6px 1.6px 0; }
  .frame > i:first-child { top: -1px;    right: -1px;   border-width: 1.6px 1.6px 0 0; }
  .frame > i:last-child  { bottom: -1px; left: -1px;    border-width: 0 0 1.6px 1.6px; }

  .content {
    position: relative;
    z-index: 6;
    padding: 52px 54px 46px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .top-strip {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 24px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--hairline);
  }
  .top-left {
    display: flex; align-items: center;
    gap: 20px;
  }
  .top-left .crown {
    width: 56px; height: 56px;
    flex-shrink: 0;
    object-fit: contain;
    filter:
      drop-shadow(0 0 12px rgba(229,184,11,0.10))
      drop-shadow(0 0 18px rgba(255, 106, 26, 0.16));
  }
  .top-wordmark {
    position: relative;
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--white);
    text-transform: uppercase;
  }
  .top-wordmark::after {
    content: attr(data-text);
    position: absolute; inset: 0; pointer-events: none;
    opacity: 0.55; color: transparent;
    background: linear-gradient(
      90deg,
      rgba(229, 184, 11, 0.10) 0%,
      rgba(255, 138, 42, 0.18) 50%,
      rgba(255, 106, 26, 0.22) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .top-right {
    display: flex;
    align-items: center;
    justify-self: end;
    gap: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--white);
    text-transform: uppercase;
  }
  .top-right .live-dot,
  .status-chip .live-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 10px rgba(255, 106, 26, 0.85), 0 0 22px rgba(255, 106, 26, 0.42);
    flex: 0 0 auto;
  }
  .top-right b { color: var(--orange-bright); font-weight: 800; }

  .main-stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    min-height: 0;
    padding: 58px 0 28px;
  }

  .lights {
    margin-top: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .lights .l-cap {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.6px;
    font-weight: 600;
    letter-spacing: 0.34em;
    color: var(--orange-soft);
    text-transform: uppercase;
    width: 202px;
    text-align: right;
  }
  .lights .l-cap.dim { color: var(--white-muted); text-align: left; }
  .lights .row {
    display: flex; gap: 16px;
    padding: 13px 20px;
    border: 1px solid var(--orange-faint);
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(20,12,6,0.75) 100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 0 24px rgba(255, 106, 26, 0.10);
    position: relative;
  }
  .lights .row::before, .lights .row::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--orange-dim);
    border-style: solid;
  }
  .lights .row::before { top: -1px; left: -1px;    border-width: 1px 0 0 1px; }
  .lights .row::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .lights .bulb {
    width: 19px; height: 19px; border-radius: 50%;
    background: var(--orange);
    border: 1px solid rgba(255, 138, 42, 0.55);
    box-shadow:
      0 0 10px rgba(255, 106, 26, 0.85),
      0 0 22px rgba(255, 106, 26, 0.45),
      inset 0 0 4px rgba(255, 230, 200, 0.45);
  }

  .eyebrow {
    margin-top: 28px;
    align-self: center;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13.4px;
    font-weight: 700;
    letter-spacing: 0.42em;
    color: var(--orange-bright);
    text-transform: uppercase;
    padding: 10px 24px;
    border-top: 1px solid var(--orange-faint);
    border-bottom: 1px solid var(--orange-faint);
  }
  .eyebrow .sep { color: var(--orange-dim); font-weight: 900; letter-spacing: 0; }

  .headline {
    margin-top: 24px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 89px;
    line-height: 0.94;
    letter-spacing: 0.005em;
    color: var(--white);
    text-transform: uppercase;
    filter:
      drop-shadow(0 4px 14px rgba(0, 0, 0, 0.55))
      drop-shadow(0 14px 36px rgba(0, 0, 0, 0.40))
      drop-shadow(0 0 40px rgba(255, 106, 26, 0.14));
  }
  .headline .accent {
    display: block;
    background: linear-gradient(180deg, #FFC089 0%, #FF8A2A 50%, #FF6A1A 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 28px rgba(255, 106, 26, 0.18));
  }

  .signal-chamber {
    position: relative;
    margin: 42px auto 0;
    width: 940px;
    min-height: 430px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 74px 32px;
    border: 1px solid var(--orange-faint);
    background:
      radial-gradient(circle at 16% 50%, rgba(226, 31, 39, 0.12) 0 3px, transparent 4px 100%),
      radial-gradient(circle at 84% 50%, rgba(255, 106, 26, 0.14) 0 3px, transparent 4px 100%),
      linear-gradient(180deg, rgba(255, 106, 26, 0.075) 0%, rgba(0,0,0,0.22) 100%),
      linear-gradient(90deg, rgba(226,31,39,0.050) 0%, rgba(255,255,255,0.010) 55%, rgba(255,106,26,0.034) 100%);
    box-shadow:
      inset 0 0 84px rgba(255, 106, 26, 0.045),
      0 0 66px rgba(255, 106, 26, 0.10);
  }
  .signal-chamber::before,
  .signal-chamber::after,
  .signal-chamber i:first-child,
  .signal-chamber i:last-child {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--orange-dim);
    border-style: solid;
    pointer-events: none;
  }
  .signal-chamber::before      { top: -1px; left: -1px; border-width: 1.5px 0 0 1.5px; }
  .signal-chamber::after       { bottom: -1px; right: -1px; border-width: 0 1.5px 1.5px 0; }
  .signal-chamber i:first-child { top: -1px; right: -1px; border-width: 1.5px 1.5px 0 0; }
  .signal-chamber i:last-child  { bottom: -1px; left: -1px; border-width: 0 0 1.5px 1.5px; }

  .logo-plate {
    position: relative;
    z-index: 2;
    width: 876px;
    min-height: 276px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px 24px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 24px 86px rgba(0,0,0,0.50),
      0 0 64px rgba(226,31,39,0.18),
      0 0 78px rgba(255,106,26,0.13);
  }
  .logo-plate::before {
    content: 'OFFICIAL PARTNER';
    position: absolute;
    top: -36px;
    left: 0;
    font-family: 'Orbitron', sans-serif;
    font-size: 14.8px;
    font-weight: 800;
    letter-spacing: 0.36em;
    color: var(--orange-soft);
    text-transform: uppercase;
    text-shadow: 0 0 14px rgba(255,106,26,0.22);
  }
  .logo-plate::after {
    content: 'SIGNAL LOCK // THANK YOU';
    position: absolute;
    bottom: -39px;
    right: 0;
    font-family: 'Orbitron', sans-serif;
    font-size: 14.4px;
    font-weight: 800;
    letter-spacing: 0.30em;
    color: var(--white-dim);
    text-transform: uppercase;
    text-shadow: 0 0 14px rgba(255,106,26,0.16);
  }
  .logo-hero {
    display: block;
    width: 846px;
    max-width: 100%;
    height: auto;
    object-fit: contain;
    filter:
      saturate(1.10)
      contrast(1.05)
      drop-shadow(0 0 18px rgba(226,31,39,0.12));
  }

  .support-line {
    position: relative;
    align-self: center;
    margin-top: 42px;
    padding: 16px 34px 18px;
    min-width: 650px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-style: normal;
    font-weight: 800;
    font-size: 23.6px;
    letter-spacing: 0.105em;
    color: var(--white);
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.075);
    background:
      linear-gradient(90deg, rgba(226,31,39,0.12), rgba(255,106,26,0.08), rgba(255,255,255,0.018));
    box-shadow:
      inset 0 -1px 0 rgba(255,106,26,0.22),
      0 0 36px rgba(255,106,26,0.055);
    filter: drop-shadow(0 0 18px rgba(226,31,39,0.10));
  }
  .support-line::before {
    content: '';
    position: absolute;
    left: 32px;
    right: 32px;
    height: 2px;
    bottom: -8px;
    background: linear-gradient(90deg, transparent 0%, var(--a2rl-red) 13%, var(--orange-bright) 50%, var(--a2rl-red) 87%, transparent 100%);
    box-shadow: 0 0 12px rgba(255,106,26,0.42);
  }
  .support-line .gold { color: var(--orange-bright); font-weight: 600; }
  .support-line .dot { color: var(--orange-dim); margin: 0 12px; font-weight: 800; }

  .status-chip {
    align-self: center;
    margin-top: 36px;
    display: inline-flex;
    align-items: center;
    gap: 18px;
    padding: 16px 30px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.025);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.32em;
    color: var(--white-muted);
    text-transform: uppercase;
  }
  .status-chip b { color: var(--orange-bright); font-weight: 800; }
  .status-chip .live-dot {
    width: 11px;
    height: 11px;
  }

  .footer {
    margin-top: auto;
    padding-top: 22px;
    border-top: 1px solid var(--hairline);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
  }
  .footer-left {
    font-family: 'Orbitron', sans-serif;
    font-size: 13.2px;
    font-weight: 700;
    letter-spacing: 0.30em;
    color: var(--white);
    text-transform: uppercase;
  }
  .footer-left .x { color: var(--orange-bright); margin: 0 6px; }
  .footer-left .gold { color: var(--orange-bright); }
  .footer-left .sub {
    display: block;
    margin-top: 5px;
    color: var(--white-muted);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.32em;
  }
  .footer-tick {
    width: 1px; height: 38px;
    background: var(--orange-dim);
  }
  .footer-right {
    text-align: right;
    font-family: 'Orbitron', sans-serif;
    font-size: 13.2px;
    font-weight: 700;
    letter-spacing: 0.30em;
    color: var(--white);
    text-transform: uppercase;
  }
  .footer-right .gold { color: var(--orange-bright); }
  .footer-right .sub {
    display: block;
    margin-top: 5px;
    color: var(--white-muted);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.32em;
  }

  @media print {
    html, body { width: 1080px; height: 1350px; overflow: hidden; background: transparent; }
    body { display: block; min-height: auto; }
    .page, .poster { width: 1080px; height: 1350px; }
    body::before, .print-btn { display: none !important; }
    .poster { box-shadow: none; }
  }
</style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">PRINT / PDF</button>

  <div class="page">
    <div class="poster">
      <div class="atmosphere"></div>
      <div class="carbon"></div>
      <div class="grid-overlay"></div>
      <div class="frame"><i></i><i></i></div>

      <div class="content">
        <div class="top-strip">
          <div class="top-left">
            <img class="crown" src="../TeamSuccessors/public/brand/logo.svg" alt="Successors crown logo">
            <span class="top-wordmark" data-text="SUCCESSORS">SUCCESSORS</span>
          </div>
          <div class="top-right">
            <span class="live-dot"></span>
            <span>PARTNER <b>// CONFIRMED</b></span>
          </div>
        </div>

        <main class="main-stack">
          <div class="lights">
            <span class="l-cap">PARTNER&nbsp;SIGNAL</span>
            <span class="row">
              <span class="bulb"></span>
              <span class="bulb"></span>
              <span class="bulb"></span>
              <span class="bulb"></span>
              <span class="bulb"></span>
            </span>
            <span class="l-cap dim">LOCKED&nbsp;IN</span>
          </div>

          <div class="eyebrow">
            <span>SUCCESSORS</span>
            <span class="sep">&times;</span>
            <span>A2RL</span>
          </div>

          <h1 class="headline">
            <span>THANK YOU!</span>
            <span class="accent">A2RL</span>
          </h1>

          <section class="signal-chamber" aria-label="A2RL partner logo">
            <i></i><i></i>
            <div class="logo-plate">
              <img class="logo-hero" src="Team-Identity Public/A2RL logo.png" alt="A2RL - Abu Dhabi Autonomous Racing League logo">
            </div>
          </section>

          <p class="support-line">
            Abu Dhabi Autonomous Racing League
          </p>

          <div class="status-chip">
            <span class="live-dot"></span>
            <span>OFFICIAL PARTNER <b>// SUCCESSORS</b></span>
          </div>
        </main>

        <div class="footer">
          <div class="footer-left">
            <span>SUCCESSORS&nbsp;<span class="x">&times;</span>&nbsp;<span class="gold">A2RL</span></span>
            <span class="sub">PARTNERSHIP ANNOUNCEMENT</span>
          </div>
          <div class="footer-tick"></div>
          <div class="footer-right">
            <span>SEASON <span class="gold">2025-2026</span></span>
            <span class="sub">SUCCESSORS</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
