<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Successors — Event Prize Cheque</title>
<!-- Print at 100% scale on 75 cm — 35 cm media for exact physical dimensions -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink:           #0a0524;
    --obsidian:      #050505;
    --obsidian-card: rgba(255, 255, 255, 0.04);
    --obsidian-border: rgba(255, 255, 255, 0.08);
    --purple-deep:   #1a0b46;
    --purple:        #3A0CA3;
    --purple-light:  #5A2ED6;
    --purple-glow:   rgba(58, 12, 163, 0.30);
    --gold:          #E5B80B;
    --gold-bright:   #FFD23F;
    --gold-dim:      rgba(229, 184, 11, 0.55);
    --gold-faint:    rgba(229, 184, 11, 0.18);
    --gold-glow:     rgba(229, 184, 11, 0.12);
    --white:         #FFFFFF;
    --white-dim:     rgba(255, 255, 255, 0.72);
    --white-muted:   rgba(255, 255, 255, 0.45);
    --hairline:      rgba(255, 255, 255, 0.10);
    --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");

    /* Place accent tokens — overridden per .place-N class */
    --accent:        #E5B80B;
    --accent-bright: #FFD23F;
    --accent-dim:    rgba(229, 184, 11, 0.55);
    --accent-faint:  rgba(229, 184, 11, 0.18);
    --accent-gradient: linear-gradient(180deg, #FFE89A 0%, #FFD23F 55%, #E5B80B 100%);
  }

  @page {
    size: 750mm 350mm;
    margin: 0;
  }

  html, body {
    background: var(--obsidian);
    font-family: 'Montserrat', sans-serif;
    color: var(--white);
    min-height: 100%;
    overflow-x: auto;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }

  body {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: var(--noise);
    background-repeat: repeat;
    pointer-events: none;
    z-index: 1;
  }

  .print-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    font-family: 'Orbitron', sans-serif;
    font-size: 9pt;
    font-weight: 700;
    color: var(--obsidian);
    background: var(--gold);
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    box-shadow: 0 2px 12px rgba(229, 184, 11, 0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .print-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(229, 184, 11, 0.45);
  }

  /* ============================================================
     CHEQUE PAGE — shared canvas for front and back
     750 mm — 350 mm. Deep purple field with restrained light
     leaks — same atmosphere as the Ethara poster but dialled
     down one stop for a more formal, ceremonial instrument.
     ============================================================ */
  .cheque-page {
    position: relative;
    z-index: 2;
    width: 750mm;
    height: 350mm;
    flex-shrink: 0;
    overflow: hidden;
    isolation: isolate;
    color: var(--white);
    background:
      radial-gradient(ellipse 50% 45% at 95% -5%,  rgba(255, 210, 63, 0.14) 0%, transparent 65%),
      radial-gradient(ellipse 45% 65% at -5% 105%, rgba(90, 40, 195, 0.28) 0%, transparent 65%),
      linear-gradient(172deg, #100621 0%, #1b0c47 50%, #2d1374 100%);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  /* Film grain */
  .cheque-page::before {
    content: '';
    position: absolute; inset: 0;
    background-image: var(--noise);
    background-repeat: repeat;
    pointer-events: none;
    z-index: 2;
  }

  /* Architectural grid, faded toward edges */
  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 60mm 60mm;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 40%, transparent 90%);
    pointer-events: none;
    z-index: 1;
  }

  /* Outer frame — sharp gold hairline with portfolio-style brackets */
  .frame {
    position: absolute;
    inset: 10mm;
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: none;
    z-index: 3;
  }
  .frame::before, .frame::after,
  .frame > i:first-child, .frame > i:last-child {
    content: '';
    position: absolute;
    width: 10mm; height: 10mm;
    border-color: var(--gold-dim);
    border-style: solid;
    pointer-events: none;
  }
  .frame::before        { top: -1px;    left: -1px;    border-width: 1.5px 0 0 1.5px; }
  .frame::after         { bottom: -1px; right: -1px;   border-width: 0 1.5px 1.5px 0; }
  .frame > i:first-child{ top: -1px;    right: -1px;   border-width: 1.5px 1.5px 0 0; }
  .frame > i:last-child { bottom: -1px; left: -1px;    border-width: 0 0 1.5px 1.5px; }

  /* ============================================================
     FRONT SIDE
     ============================================================ */
  .front-content {
    --front-type-scale: 1.28;
    position: relative;
    z-index: 4;
    padding: 18mm 24mm;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Subtle crown watermark behind the write-in area */
  .watermark {
    position: absolute;
    z-index: 3;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250mm;
    height: 250mm;
    object-fit: contain;
    opacity: 0.0375;
    filter: blur(2.5mm);
    pointer-events: none;
  }

  /* ---------- Header Strip ---------- */
  .header-strip {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding-bottom: 6mm;
    border-bottom: 1px solid var(--hairline);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 5mm;
    justify-self: start;
  }

  .header-left .crown {
    width: calc(22mm * var(--front-type-scale));
    height: calc(22mm * var(--front-type-scale));
    flex-shrink: 0;
    display: block;
    object-fit: contain;
  }

  .wordmark {
    position: relative;
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: calc(28pt * var(--front-type-scale));
    font-weight: 800;
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--white);
    text-transform: uppercase;
  }
  .wordmark::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.55;
    color: transparent;
    background: linear-gradient(
      90deg,
      rgba(58, 12, 163, 0.18) 0%,
      rgba(58, 12, 163, 0.18) 30%,
      rgba(85, 43, 175, 0.17) 40%,
      rgba(121, 76, 140, 0.16) 50%,
      rgba(172, 130, 77, 0.17) 60%,
      rgba(229, 184, 11, 0.18) 70%,
      rgba(229, 184, 11, 0.18) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right {
    justify-self: end;
    font-family: 'Orbitron', sans-serif;
    font-size: calc(11pt * var(--front-type-scale));
    font-weight: 700;
    letter-spacing: 0.32em;
    color: var(--white-muted);
    text-transform: uppercase;
  }

  /* ---------- Place Badge ---------- */
  .place-section {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10mm 0;
  }

  .place-badge {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10mm 40mm;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border: 1px solid var(--hairline);
    border-radius: 2mm;
    backdrop-filter: blur(2px);
  }
  /* Badge bracket corners */
  .place-badge > i:first-child,
  .place-badge > i:last-child {
    content: '';
    position: absolute;
    width: 6mm; height: 6mm;
    border-color: var(--accent-dim);
    border-style: solid;
    pointer-events: none;
  }
  .place-badge > i:first-child { top: 2.5mm;    left: 2.5mm;    border-width: 1.5px 0 0 1.5px; }
  .place-badge > i:last-child  { bottom: 2.5mm; right: 2.5mm;   border-width: 0 1.5px 1.5px 0; }

  .badge-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1mm;
  }

  /* Ornamental flanking lines above and below badge content */
  .badge-inner::before,
  .badge-inner::after {
    content: '';
    width: 70mm;
    height: 0.21mm;
    border-radius: 999px;
    flex-shrink: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(229, 184, 11, 0.12) 18%,
      rgba(255, 210, 63, 0.52) 50%,
      rgba(229, 184, 11, 0.12) 82%,
      transparent 100%
    );
    box-shadow: 0 0 1mm rgba(229, 184, 11, 0.06);
  }

  .place-ordinal {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 80pt;
    line-height: 0.90;
    letter-spacing: -0.005em;
    text-transform: uppercase;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter:
      drop-shadow(0 2mm 4mm rgba(0, 0, 0, 0.25))
      drop-shadow(0 0 8mm rgba(229, 184, 11, 0.08));
  }

  .place-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 22pt;
    font-weight: 700;
    letter-spacing: 0.42em;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 1mm;
  }

  /* ---------- Section Divider ---------- */
  .section-rule {
    width: 100%;
    height: 1px;
    background: var(--hairline);
    flex-shrink: 0;
  }

  /* ---------- Write-in Fields ---------- */
  .fields {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10mm;
    padding: 4mm 0;
  }

  .field-row {
    display: grid;
    gap: 20mm;
  }
  .field-row.split-major-minor { grid-template-columns: 1.5fr 1fr; }
  .field-row.split-half        { grid-template-columns: 1fr 1fr; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 3mm;
  }

  .field-label {
    font-family: 'Orbitron', sans-serif;
    font-size: calc(11pt * var(--front-type-scale));
    font-weight: 700;
    letter-spacing: 0.30em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .write-line {
    height: 18mm;
    border-bottom: calc(0.5mm * var(--front-type-scale)) solid rgba(229, 184, 11, 0.25);
  }

  .write-box {
    position: relative;
    height: 22mm;
    border: calc(0.5mm * var(--front-type-scale)) solid rgba(229, 184, 11, 0.25);
    border-radius: 1.5mm;
  }
  .write-box::after {
    content: 'AED';
    position: absolute;
    top: 2.4mm;
    right: 3mm;
    font-family: 'Orbitron', sans-serif;
    font-size: calc(12pt * var(--front-type-scale));
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: var(--gold-dim);
  }

  /* ---------- Footer ---------- */
  .cheque-footer {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding-top: 5mm;
    border-top: 1px solid var(--hairline);
    flex-shrink: 0;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 3mm;
    font-family: 'Orbitron', sans-serif;
    font-size: calc(10pt * var(--front-type-scale));
    font-weight: 700;
    letter-spacing: 0.24em;
    color: var(--white-muted);
    text-transform: uppercase;
  }

  .footer-pipe {
    display: inline-block;
    width: 1px;
    height: 3.5mm;
    background: var(--gold-dim);
  }

  .footer-crown {
    width: calc(10mm * var(--front-type-scale));
    height: calc(10mm * var(--front-type-scale));
    object-fit: contain;
    opacity: 0.35;
    justify-self: end;
  }

  /* ============================================================
     PLACE ACCENT OVERRIDES
     Only the badge area shifts colour â€” everything structural
     (frame, labels, field lines, footer) stays gold.
     ============================================================ */
  .place-1 {
    --accent:        #E5B80B;
    --accent-bright: #FFD23F;
    --accent-dim:    rgba(229, 184, 11, 0.55);
    --accent-faint:  rgba(229, 184, 11, 0.18);
    --accent-gradient: linear-gradient(180deg, #FFE89A 0%, #FFD23F 55%, #E5B80B 100%);
  }

  .place-2 {
    --accent:        #C0C0C0;
    --accent-bright: #E8E8E8;
    --accent-dim:    rgba(192, 192, 192, 0.55);
    --accent-faint:  rgba(192, 192, 192, 0.18);
    --accent-gradient: linear-gradient(180deg, #F0F0F0 0%, #D4D4D4 55%, #A8A8A8 100%);
  }

  .place-3 {
    --accent:        #CD7F32;
    --accent-bright: #E8A04E;
    --accent-dim:    rgba(205, 127, 50, 0.55);
    --accent-faint:  rgba(205, 127, 50, 0.18);
    --accent-gradient: linear-gradient(180deg, #F0C68A 0%, #E8A04E 55%, #CD7F32 100%);
  }

  /* ============================================================
     BACK SIDE â€” minimal, elegant, brand-only
     ============================================================ */
  .back-content {
    --back-scale: 1.35;
    --back-gap-scale: 1.45;
    position: relative;
    z-index: 4;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .back-logo {
    width: calc(80mm * var(--back-scale));
    height: calc(80mm * var(--back-scale));
    object-fit: contain;
    filter: drop-shadow(0 0 calc(15mm * var(--back-scale)) rgba(229, 184, 11, 0.08));
    margin-bottom: calc(-2.8mm * var(--back-scale));
  }

  .back-wordmark {
    position: relative;
    font-family: 'Orbitron', sans-serif;
    font-size: calc(42pt * var(--back-scale));
    font-weight: 800;
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--white);
    text-transform: uppercase;
    margin-top: calc(1mm * var(--back-scale) * var(--back-gap-scale));
  }
  .back-wordmark::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.55;
    color: transparent;
    background: linear-gradient(
      90deg,
      rgba(58, 12, 163, 0.18) 0%,
      rgba(58, 12, 163, 0.18) 30%,
      rgba(85, 43, 175, 0.17) 40%,
      rgba(121, 76, 140, 0.16) 50%,
      rgba(172, 130, 77, 0.17) 60%,
      rgba(229, 184, 11, 0.18) 70%,
      rgba(229, 184, 11, 0.18) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .back-motto {
    font-family: 'Montserrat', sans-serif;
    font-size: calc(15pt * var(--back-scale));
    font-weight: 500;
    letter-spacing: 0.02em;
    line-height: 1.35;
    color: var(--white-dim);
    margin-top: calc(0.26mm * var(--back-scale) * var(--back-gap-scale));
  }

  .back-rule {
    width: calc(52mm * var(--back-scale));
    height: calc(0.24mm * var(--back-scale));
    border-radius: 999px;
    flex-shrink: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(229, 184, 11, 0.18) 18%,
      rgba(255, 210, 63, 0.68) 50%,
      rgba(229, 184, 11, 0.18) 82%,
      transparent 100%
    );
    box-shadow: 0 0 calc(1.6mm * var(--back-scale)) rgba(229, 184, 11, 0.08);
    margin: calc(2mm * var(--back-scale) * var(--back-gap-scale)) 0;
  }

  .back-tagline {
    font-family: 'Orbitron', sans-serif;
    font-size: calc(11pt * var(--back-scale));
    font-weight: 600;
    letter-spacing: 0.32em;
    color: var(--white-muted);
    text-transform: uppercase;
    margin-top: 0;
  }

  @media print {
    html, body {
      background: transparent;
      overflow: visible;
    }
    body {
      display: block;
      min-height: auto;
      padding: 0;
      gap: 0;
    }
    body::before,
    .print-btn {
      display: none !important;
    }
    .cheque-front { break-after: page; }
    .cheque-page  { box-shadow: none; }
    .badge-inner::before,
    .badge-inner::after {
      height: 0.8mm;
      transform: scaleY(0.2625);
      transform-origin: center;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(229, 184, 11, 0.12) 18%,
        rgba(255, 210, 63, 0.52) 50%,
        rgba(229, 184, 11, 0.12) 82%,
        transparent 100%
      );
      box-shadow: 0 0 1mm rgba(229, 184, 11, 0.06);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

</style>
</head>
<body>

<button class="print-btn" onclick="window.print()">PRINT / PDF</button>

<!-- ===== FRONT SIDE ===== -->
<div class="cheque-page cheque-front place-1">
  <div class="grid-overlay"></div>
  <div class="frame"><i></i><i></i></div>

  <div class="front-content">

    <!-- Crown watermark behind fields -->
    <img class="watermark" src="../TeamSuccessors/public/brand/logo.svg" alt="">

    <!-- Header Strip -->
    <header class="header-strip">
      <div class="header-left">
        <img class="crown" src="../TeamSuccessors/public/brand/logo.svg" alt="Successors logo">
        <span class="wordmark" data-text="SUCCESSORS">SUCCESSORS</span>
      </div>
      <div></div>
      <div class="header-right">F1 IN SCHOOLS &middot; STEM RACING</div>
    </header>

    <!-- Place Badge -->
    <section class="place-section">
      <div class="place-badge">
        <i></i><i></i>
        <div class="badge-inner">
          <span class="place-ordinal">1ST</span>
          <span class="place-label">PLACE</span>
        </div>
      </div>
    </section>

    <div class="section-rule"></div>

    <!-- Write-in Fields -->
    <section class="fields">
      <div class="field">
        <span class="field-label">Competition Title</span>
        <div class="write-line"></div>
      </div>

      <div class="field-row split-major-minor">
        <div class="field">
          <span class="field-label">The Sum Of</span>
          <div class="write-line"></div>
        </div>
        <div class="field">
          <span class="field-label">Amount</span>
          <div class="write-box"></div>
        </div>
      </div>

      <div class="field-row split-half">
        <div class="field">
          <span class="field-label">Received By</span>
          <div class="write-line"></div>
        </div>
        <div class="field">
          <span class="field-label">Date</span>
          <div class="write-line"></div>
        </div>
      </div>
    </section>

    <div class="section-rule"></div>

    <!-- Footer -->
    <footer class="cheque-footer">
      <div class="footer-brand">
        <span>SUCCESSORS</span>
        <span class="footer-pipe"></span>
        <span>F1 IN SCHOOLS</span>
      </div>
      <img class="footer-crown" src="../TeamSuccessors/public/brand/logo.svg" alt="">
    </footer>

  </div>
</div>

<!-- ===== BACK SIDE ===== -->
<div class="cheque-page cheque-back">
  <div class="grid-overlay"></div>
  <div class="frame"><i></i><i></i></div>

  <div class="back-content">
    <img class="back-logo" src="../TeamSuccessors/public/brand/logo.svg" alt="Team Successors Crown">
    <div class="back-wordmark" data-text="SUCCESSORS">SUCCESSORS</div>
    <div class="back-motto">Inheriting the Legacy. Defining the Future.</div>
    <div class="back-rule"></div>
    <div class="back-tagline">F1 IN SCHOOLS &middot; STEM RACING</div>
  </div>
</div>

<script>
  (() => {
    /* ============================================================
       PLACE TOGGLE
       Change this value to switch between placements.
       1 = 1st Place (gold)
       2 = 2nd Place (silver)
       3 = 3rd Place (bronze)
       ============================================================ */
    const PLACE = 1;

    const ordinals = { 1: '1ST', 2: '2ND', 3: '3RD' };
    const front    = document.querySelector('.cheque-front');
    const ordinalEl = document.querySelector('.place-ordinal');

    if (!front || !ordinalEl) return;

    ordinalEl.textContent = ordinals[PLACE] || '1ST';
    front.classList.add('place-' + PLACE);
  })();
</script>
</body>
</html>
